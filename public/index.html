<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Point quotidien — Sprint en cours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Dark grey surfaces with a dark red signature accent. */
        --paper: #1a1a1d;
        --card: #242428;
        --ink: #ececee;
        --muted: #9a9aa3;
        --hair: #38383f;
        --accent: #b3242f;
        --accent-bg: #2c1518;
        --done: #3fae74;
        --done-bg: #15281e;
        --today: #5d8cf0;
        --today-bg: #182338;
        --todo: #d6a23f;
        --todo-bg: #2a2214;
        --estimate: #a98cf0;
        --estimate-bg: #211b34;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 10px 28px rgba(0, 0, 0, 0.45);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 2rem clamp(1rem, 4vw, 3rem) 1.25rem;
        border-bottom: 1px solid var(--hair);
      }
      .brand { display: flex; align-items: center; gap: 1rem; }
      .logo {
        flex: none;
        width: clamp(44px, 5vw, 60px);
        height: clamp(44px, 5vw, 60px);
        border-radius: 14px;
        object-fit: contain;
      }
      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(1.4rem, 2.4vw, 2.1rem);
        letter-spacing: -0.02em;
        margin: 0;
      }
      .eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 0.35rem;
      }
      .live {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 0 rgba(179, 36, 47, 0.5);
        animation: pulse 2.4s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(179, 36, 47, 0.45); }
        70% { box-shadow: 0 0 0 7px rgba(179, 36, 47, 0); }
        100% { box-shadow: 0 0 0 0 rgba(179, 36, 47, 0); }
      }
      main { padding: 1.5rem clamp(1rem, 4vw, 3rem) 4rem; }
      .lane {
        display: grid;
        grid-template-columns: 220px repeat(4, minmax(0, 1fr));
        align-items: start;
        gap: 1rem;
        padding: 1.25rem 0;
        border-bottom: 1px solid var(--hair);
        animation: rise 0.4s ease both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .who {
        display: flex; align-items: center; gap: 0.75rem;
        cursor: pointer; user-select: none;
        background: none; border: 0; padding: 0; margin: 0;
        font: inherit; color: inherit; text-align: left; width: 100%;
      }
      .chevron {
        flex: none; margin-left: auto; color: var(--muted);
        transition: transform 0.2s ease;
      }
      .lane.collapsed .chevron { transform: rotate(-90deg); }
      .lane.collapsed { grid-template-columns: 1fr; }
      .lane.collapsed .col-done,
      .lane.collapsed .col-progress,
      .lane.collapsed .col-todo,
      .lane.collapsed .col-estimate { display: none; }
      /* Focus mode: a clicked column header expands that column to full width. */
      .lane.focused { grid-template-columns: 220px minmax(0, 1fr); }
      .lane.focused .col-done,
      .lane.focused .col-progress,
      .lane.focused .col-todo,
      .lane.focused .col-estimate { display: none; }
      .lane.focused .col-active { display: block; }
      /* Collapsing a lane wins over focus mode: a focused column must still hide
         when the whole person section is collapsed. */
      .lane.collapsed.focused { grid-template-columns: 1fr; }
      .lane.collapsed .col-active { display: none; }
      @media (prefers-reduced-motion: reduce) {
        .chevron { transition: none; }
      }
      .avatar {
        flex: none;
        width: 44px; height: 44px; border-radius: 50%;
        display: grid; place-items: center;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600; font-size: 1rem;
        background: var(--accent); color: #fff;
      }
      .who .name { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 1.05rem; }
      .who .count { font-size: 0.78rem; color: var(--muted); }
      .col-label {
        font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); margin: 0 0 0.6rem;
        cursor: pointer; user-select: none;
      }
      .col-label:hover { opacity: 0.7; }
      .col-label .focus-hint {
        font-weight: 600; opacity: 0; margin-left: 0.35rem;
        transition: opacity 0.15s ease;
      }
      .col-label:hover .focus-hint { opacity: 0.6; }
      .lane.focused .col-active .focus-hint { opacity: 0.6; }
      .stack { display: flex; flex-direction: column; gap: 0.75rem; }
      .comp-group { display: flex; flex-direction: column; gap: 0.4rem; }
      .parent-group { display: flex; flex-direction: column; gap: 0.4rem; }
      .parent-head {
        display: flex; align-items: center; gap: 0.4rem;
        cursor: pointer; user-select: none;
        background: var(--card); border: 1px solid var(--hair);
        border-radius: 10px; padding: 0.5rem 0.6rem;
        font: inherit; color: inherit; text-align: left; width: 100%;
        box-shadow: var(--shadow);
      }
      .parent-head:hover { border-color: var(--accent); }
      .parent-head .key { flex: none; }
      .parent-head .parent-summary {
        font-size: 0.88rem; line-height: 1.3; font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .parent-head .parent-count {
        flex: none; margin-left: auto;
        font-size: 0.7rem; font-weight: 500; color: var(--muted);
        background: var(--paper); border-radius: 999px; padding: 0.1rem 0.5rem;
      }
      .parent-head .parent-finished {
        flex: none; margin-left: auto;
        font-size: 0.68rem; color: var(--done); white-space: nowrap;
      }
      .parent-head .parent-finished + .parent-count { margin-left: 0.5rem; }
      .parent-head .chevron { flex: none; margin-left: 0; }
      .parent-group.collapsed .chevron { transform: rotate(-90deg); }
      .parent-children { padding-left: 0.85rem; border-left: 2px solid var(--hair); margin-left: 0.3rem; }
      .parent-group.collapsed .parent-children { display: none; }
      .comp-label {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.72rem; font-weight: 600;
        color: var(--ink);
        margin: 0;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid var(--hair);
      }
      .comp-chip {
        display: inline-block;
        padding: 0.1rem 0.45rem;
        border-radius: 4px;
        color: #1a1a1a;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--hair);
        border-radius: 10px;
        padding: 0.6rem 0.75rem;
        box-shadow: var(--shadow);
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .card:hover { border-color: var(--accent); }
      .card .top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
      .key { font-family: "JetBrains Mono", monospace; font-size: 0.74rem; color: var(--muted); }
      .pill {
        margin-left: auto;
        font-size: 0.68rem; font-weight: 500;
        padding: 0.12rem 0.5rem; border-radius: 999px;
      }
      .col-done .pill { background: var(--done-bg); color: var(--done); }
      .col-progress .pill { background: var(--today-bg); color: var(--today); }
      .col-todo .pill { background: var(--todo-bg); color: var(--todo); }
      .col-estimate .pill { background: var(--estimate-bg); color: var(--estimate); }
      .summary { font-size: 0.9rem; line-height: 1.35; }
      .col-done .summary { color: var(--muted); }
      .finished-date { font-size: 0.7rem; color: var(--done); margin-top: 0.35rem; }
      .empty { font-size: 0.85rem; color: var(--muted); font-style: italic; padding: 0.3rem 0; }
      .notice { padding: 3rem clamp(1rem, 4vw, 3rem); color: var(--muted); }
      .notice.error { color: #b3261e; }
      @media (max-width: 760px) {
        .lane { grid-template-columns: 1fr; }
      }
      /* Welcome splash shown for 10s when the board opens. */
      .splash {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
        background: rgba(15, 15, 18, 0.94);
        backdrop-filter: blur(8px);
        cursor: pointer;
        animation: splashOut 0.6s ease 5.4s forwards;
      }
      .splash.dismissed { display: none; }
      .splash-text {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(1.8rem, 5vw, 4rem);
        line-height: 1.2;
        letter-spacing: -0.02em;
        max-width: 20ch;
        animation: splashPop 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      }
      .splash-text .accent { color: var(--accent); text-transform: capitalize; }
      @keyframes splashPop {
        0% { opacity: 0; transform: scale(0.6); }
        60% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes splashOut {
        to { opacity: 0; visibility: hidden; }
      }
      @media (prefers-reduced-motion: reduce) {
        .lane, .dot { animation: none; }
        .splash-text { animation: none; }
        .splash { animation: splashOut 0.3s ease 5.7s forwards; }
      }
    </style>
  </head>
  <body>
    <div class="splash" id="splash" role="dialog" aria-label="Bienvenue">
      <div class="splash-text">Bonjour à tous, bienvenue à ce daily du <span class="accent" id="splash-date"></span></div>
    </div>
    <header>
      <div class="brand">
        <img class="logo" src="/images/logo%20(2).png" alt="Logo" />
        <div>
          <p class="eyebrow" id="eyebrow">Dailyapss - Auto · Daily du …</p>
          <h1 id="title">Ce que nous avons livré &amp; la suite</h1>
        </div>
      </div>
      <span class="live"><span class="dot"></span><span id="freshness">connexion…</span></span>
    </header>
    <main id="board">
      <p class="notice">Chargement du sprint en cours…</p>
    </main>

    <script>
      // Welcome splash: pops in, then fades out and is removed after 10 seconds
      // (the CSS animation handles the fade; this clears it from the DOM and
      // allows an early dismiss on click).
      const splash = document.getElementById("splash");
      if (splash) {
        document.getElementById("splash-date").textContent =
          new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        const dismissSplash = () => splash.classList.add("dismissed");
        setTimeout(dismissSplash, 6000);
        splash.addEventListener("click", dismissSplash);
      }

      const board = document.getElementById("board");
      const freshness = document.getElementById("freshness");

      document.getElementById("eyebrow").textContent =
        "Dailyapss - Auto · Daily du " +
        new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

      // Replace the title with a random technology quote (translated to French).
      const loadQuote = async () => {
        try {
          const res = await fetch("/api/quote");
          if (!res.ok) return;
          const { text, author } = await res.json();
          if (!text) return;
          document.getElementById("title").textContent =
            author ? `« ${text} » — ${author}` : `« ${text} »`;
        } catch {
          /* keep the default title on failure */
        }
      };
      loadQuote();

      const initials = (name) =>
        name === "Non assigné"
          ? "?"
          : name.split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase();

      const NO_COMPONENT = "Sans composant";

      // Stable unique background color per component name (hash -> hue).
      const componentColor = (name) => {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
        }
        const hue = hash % 360;
        return `hsl(${hue}, 85%, 60%)`;
      };

      // The most recent completion time among a set of cards (ISO strings compare
      // chronologically), used to order the finished column newest-first.
      const latestFinished = (cards) =>
        cards.reduce((max, c) => (c.finishedAt && c.finishedAt > max ? c.finishedAt : max), "");

      // Renders a column's cards grouped under their component(s), and within each
      // component rolled up under their parent ticket. When sortBy is "finished",
      // components and items are ordered by latest completion (newest first)
      // instead of alphabetically.
      const columnHtml = (cards, emptyText, keyPrefix, sortBy) => {
        if (!cards.length) return `<p class="empty">${emptyText}</p>`;
        const byComponent = new Map();
        for (const card of cards) {
          const names = card.components.length ? card.components : [NO_COMPONENT];
          for (const name of names) {
            if (!byComponent.has(name)) byComponent.set(name, []);
            byComponent.get(name).push(card);
          }
        }
        const names = [...byComponent.keys()].sort((a, b) => {
          if (sortBy === "finished") return latestFinished(byComponent.get(b)).localeCompare(latestFinished(byComponent.get(a)));
          if (a === NO_COMPONENT) return 1;
          if (b === NO_COMPONENT) return -1;
          return a.localeCompare(b);
        });
        return names
          .map(
            (name) => `
              <div class="comp-group">
                <p class="comp-label"><span class="comp-chip" style="background: ${componentColor(name)};">${escapeHtml(name)}</span></p>
                ${parentGroupedHtml(byComponent.get(name), `${keyPrefix}|${name}`, sortBy)}
              </div>`
          )
          .join("");
      };

      // Within a component, cards that belong to the same Story become one
      // collapsible group named after that Story (even if the Story itself isn't
      // assigned to this person). Cards with no Story — and a Story that stands
      // alone with no related tickets in this column — render as standalone cards.
      const parentGroupedHtml = (cards, keyPrefix, sortBy) => {
        const byParent = new Map();
        const orphans = [];
        for (const card of cards) {
          if (!card.parent) {
            orphans.push(card);
            continue;
          }
          if (!byParent.has(card.parent.key)) {
            byParent.set(card.parent.key, { parent: card.parent, cards: [] });
          }
          byParent.get(card.parent.key).cards.push(card);
        }
        const groups = [];
        for (const group of byParent.values()) {
          // A lone Story (only itself, no related tickets here) is just a card.
          if (group.cards.length === 1 && group.cards[0].key === group.parent.key) {
            orphans.push(group.cards[0]);
            continue;
          }
          groups.push(group);
        }
        if (sortBy === "finished") {
          // Interleave Story groups and standalone cards, newest completion first.
          const items = [
            ...groups.map((g) => ({ html: parentGroupHtml(g, `${keyPrefix}|${g.parent.key}`), finishedAt: latestFinished(g.cards) })),
            ...orphans.map((c) => ({ html: cardHtml(c), finishedAt: c.finishedAt ?? "" })),
          ];
          items.sort((a, b) => b.finishedAt.localeCompare(a.finishedAt));
          return items.map((i) => i.html).join("");
        }
        // Default: Story groups first (by summary), then standalone cards in order.
        const groupsHtml = groups
          .sort((a, b) => a.parent.summary.localeCompare(b.parent.summary))
          .map((g) => parentGroupHtml(g, `${keyPrefix}|${g.parent.key}`))
          .join("");
        return groupsHtml + orphans.map(cardHtml).join("");
      };

      const parentGroupHtml = ({ parent, cards }, groupKey) => {
        const isCollapsed = !expandedParents.has(groupKey);
        const allDone = cards.every((c) => c.category === "done");
        const finishedAt = allDone ? latestFinished(cards) : "";
        return `
          <div class="parent-group${isCollapsed ? " collapsed" : ""}" data-group="${escapeHtml(groupKey)}">
            <button class="parent-head" type="button" aria-expanded="${!isCollapsed}">
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="key">${parent.key}</span>
              <span class="parent-summary">${escapeHtml(cleanSummary(parent.summary))}</span>
              ${finishedAt ? `<span class="parent-finished">${formatFinished(finishedAt)}</span>` : ""}
              <span class="parent-count">${cards.length}</span>
            </button>
            <div class="parent-children stack">
              ${cards.map(cardHtml).join("")}
            </div>
          </div>`;
      };

      // "23 juin 2026" from an ISO timestamp.
      const formatFinished = (iso) =>
        new Date(iso).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });

      const cardHtml = (card) => `
        <a class="card" href="${card.url}" target="_blank" rel="noopener">
          <div class="top">
            <span class="key">${card.key}</span>
            <span class="pill">${card.status}</span>
          </div>
          <div class="summary">${escapeHtml(cleanSummary(card.summary))}</div>
          ${card.category === "done" && card.finishedAt ? `<div class="finished-date">Terminé le ${formatFinished(card.finishedAt)}</div>` : ""}
        </a>`;

      const escapeHtml = (s) =>
        s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      // Strips bracketed tags from a summary — story points like "[6.4pts]" and
      // category prefixes like "[REFONTE]" — then tidies up the leftover leading
      // separators (pipes / dashes) so e.g.
      //   "[5.5pts] | [REFONTE] - Nouveau paramètre…" -> "Nouveau paramètre…"
      const cleanSummary = (s) =>
        s
          .replace(/\[[^\]]*\]/g, "")   // drop every [..] tag
          .replace(/\s+/g, " ")          // collapse whitespace
          .replace(/^[\s|–—-]+/, "")    // trim leading separators / dashes
          .trim();

      const collapsed = new Set();
      const expandedParents = new Set();
      const focusedColumn = new Map(); // person name -> focused column key
      let firstRender = true;

      const COLUMNS = [
        { key: "done", color: "var(--done)", label: "Terminé (sprint en cours)", empty: "Rien de terminé pour l'instant" },
        { key: "progress", color: "var(--today)", label: "En cours", empty: "Rien en cours" },
        { key: "todo", color: "var(--todo)", label: "À faire", empty: "Aucun élément planifié" },
        { key: "estimate", color: "var(--estimate)", label: "À chiffrer", empty: "Rien à chiffrer" },
      ];

      const laneHtml = (person) => {
        const isCollapsed = collapsed.has(person.name);
        const focused = focusedColumn.get(person.name);
        const columns = COLUMNS.map((c) => `
          <div class="col-${c.key}${focused === c.key ? " col-active" : ""}" data-col="${c.key}">
            <p class="col-label" style="color: ${c.color};">${c.label}<span class="focus-hint" aria-hidden="true">⤢</span></p>
            <div class="stack">
              ${columnHtml(person[c.key], c.empty, `${person.name}|${c.key}`, c.key === "done" ? "finished" : null)}
            </div>
          </div>`).join("");
        return `
        <section class="lane${isCollapsed ? " collapsed" : ""}${focused ? " focused" : ""}" data-person="${escapeHtml(person.name)}">
          <button class="who" type="button" aria-expanded="${!isCollapsed}">
            <div class="avatar">${initials(person.name)}</div>
            <div>
              <div class="name">${escapeHtml(person.name)}</div>
              <div class="count">${person.done.length} terminé(s) · ${person.progress.length} en cours · ${person.todo.length} à faire · ${person.estimate.length} à chiffrer</div>
            </div>
            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          ${columns}
        </section>`;
      };

      const render = (data) => {
        const people = data.people ?? [];
        if (!people.length) {
          board.innerHTML = '<p class="notice">Aucun ticket dans le sprint ouvert actuel. Vérifiez qu\'un sprint est démarré dans Jira.</p>';
          return;
        }
        if (firstRender) {
          people.forEach((p) => collapsed.add(p.name));
          firstRender = false;
        }
        board.innerHTML = people.map(laneHtml).join("");
      };

      const load = async () => {
        try {
          const res = await fetch("/api/standup");
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          const data = await res.json();
          render(data);
          freshness.textContent = "mis à jour à " + new Date(data.generatedAt).toLocaleTimeString("fr-FR");
        } catch (err) {
          board.innerHTML = `<p class="notice error">Impossible de joindre Jira : ${escapeHtml(String(err.message))}</p>`;
          freshness.textContent = "échec de la mise à jour";
        }
      };

      board.addEventListener("click", (e) => {
        const label = e.target.closest(".col-label");
        if (label) {
          const lane = label.closest(".lane");
          const colDiv = label.closest("[data-col]");
          const name = lane.dataset.person;
          const col = colDiv.dataset.col;
          const alreadyFocused = focusedColumn.get(name) === col;
          lane.querySelectorAll(".col-active").forEach((el) => el.classList.remove("col-active"));
          if (alreadyFocused) {
            focusedColumn.delete(name);
            lane.classList.remove("focused");
          } else {
            focusedColumn.set(name, col);
            lane.classList.add("focused");
            colDiv.classList.add("col-active");
          }
          return;
        }
        const head = e.target.closest(".parent-head");
        if (head) {
          const group = head.closest(".parent-group");
          const key = group.dataset.group;
          if (expandedParents.has(key)) expandedParents.delete(key);
          else expandedParents.add(key);
          group.classList.toggle("collapsed");
          head.setAttribute("aria-expanded", String(!group.classList.contains("collapsed")));
          return;
        }
        const who = e.target.closest(".who");
        if (!who) return;
        const lane = who.closest(".lane");
        const name = lane.dataset.person;
        const opening = collapsed.has(name);
        if (opening) {
          // Accordion: opening one person collapses every other person.
          board.querySelectorAll(".lane").forEach((el) => collapsed.add(el.dataset.person));
          collapsed.delete(name);
        } else {
          collapsed.add(name);
        }
        // Reflect the collapsed set on every lane in the DOM.
        board.querySelectorAll(".lane").forEach((el) => {
          const isCollapsed = collapsed.has(el.dataset.person);
          el.classList.toggle("collapsed", isCollapsed);
          el.querySelector(".who").setAttribute("aria-expanded", String(!isCollapsed));
        });
      });

      load();
      setInterval(load, 60000);
    </script>
  </body>
</html>
