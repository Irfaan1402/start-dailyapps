<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Point quotidien — Sprint en cours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f4f6f8;
        --card: #ffffff;
        --ink: #1b2733;
        --muted: #6b7886;
        --hair: #dce2e8;
        --done: #1f8a55;
        --done-bg: #e8f4ec;
        --today: #2563c9;
        --today-bg: #e8eefb;
        --todo: #8a5a1f;
        --todo-bg: #f6efe4;
        --estimate: #7c3aed;
        --estimate-bg: #f0e9fc;
        --shadow: 0 1px 2px rgba(27, 39, 51, 0.06), 0 8px 24px rgba(27, 39, 51, 0.05);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        padding: 2rem clamp(1rem, 4vw, 3rem) 1.25rem;
        border-bottom: 1px solid var(--hair);
      }
      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(1.4rem, 2.4vw, 2.1rem);
        letter-spacing: -0.02em;
        margin: 0;
      }
      .eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 0.35rem;
      }
      .live {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--done);
        box-shadow: 0 0 0 0 rgba(31, 138, 85, 0.5);
        animation: pulse 2.4s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(31, 138, 85, 0.45); }
        70% { box-shadow: 0 0 0 7px rgba(31, 138, 85, 0); }
        100% { box-shadow: 0 0 0 0 rgba(31, 138, 85, 0); }
      }
      main { padding: 1.5rem clamp(1rem, 4vw, 3rem) 4rem; }
      .lane {
        display: grid;
        grid-template-columns: 220px 1fr 1fr 1fr 1fr;
        align-items: start;
        gap: 1rem;
        padding: 1.25rem 0;
        border-bottom: 1px solid var(--hair);
        animation: rise 0.4s ease both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .who {
        display: flex; align-items: center; gap: 0.75rem;
        cursor: pointer; user-select: none;
        background: none; border: 0; padding: 0; margin: 0;
        font: inherit; color: inherit; text-align: left; width: 100%;
      }
      .chevron {
        flex: none; margin-left: auto; color: var(--muted);
        transition: transform 0.2s ease;
      }
      .lane.collapsed .chevron { transform: rotate(-90deg); }
      .lane.collapsed { grid-template-columns: 1fr; }
      .lane.collapsed .col-done,
      .lane.collapsed .col-progress,
      .lane.collapsed .col-todo,
      .lane.collapsed .col-estimate { display: none; }
      @media (prefers-reduced-motion: reduce) {
        .chevron { transition: none; }
      }
      .avatar {
        flex: none;
        width: 44px; height: 44px; border-radius: 50%;
        display: grid; place-items: center;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600; font-size: 1rem;
        background: var(--ink); color: #fff;
      }
      .who .name { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 1.05rem; }
      .who .count { font-size: 0.78rem; color: var(--muted); }
      .col-label {
        font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); margin: 0 0 0.6rem;
      }
      .stack { display: flex; flex-direction: column; gap: 0.75rem; }
      .comp-group { display: flex; flex-direction: column; gap: 0.4rem; }
      .comp-label {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.72rem; font-weight: 600;
        color: var(--ink);
        margin: 0;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid var(--hair);
      }
      .comp-chip {
        display: inline-block;
        padding: 0.1rem 0.45rem;
        border-radius: 4px;
        color: #1a1a1a;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--hair);
        border-radius: 10px;
        padding: 0.6rem 0.75rem;
        box-shadow: var(--shadow);
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .card:hover { border-color: #c4ccd4; }
      .card .top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
      .key { font-family: "JetBrains Mono", monospace; font-size: 0.74rem; color: var(--muted); }
      .pill {
        margin-left: auto;
        font-size: 0.68rem; font-weight: 500;
        padding: 0.12rem 0.5rem; border-radius: 999px;
      }
      .col-done .pill { background: var(--done-bg); color: var(--done); }
      .col-progress .pill { background: var(--today-bg); color: var(--today); }
      .col-todo .pill { background: var(--todo-bg); color: var(--todo); }
      .col-estimate .pill { background: var(--estimate-bg); color: var(--estimate); }
      .summary { font-size: 0.9rem; line-height: 1.35; }
      .col-done .summary { color: var(--muted); }
      .empty { font-size: 0.85rem; color: var(--muted); font-style: italic; padding: 0.3rem 0; }
      .notice { padding: 3rem clamp(1rem, 4vw, 3rem); color: var(--muted); }
      .notice.error { color: #b3261e; }
      @media (max-width: 760px) {
        .lane { grid-template-columns: 1fr; }
      }
      @media (prefers-reduced-motion: reduce) {
        .lane, .dot { animation: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow" id="eyebrow">Dailyapss - Auto · Daily du …</p>
        <h1>Ce que nous avons livré &amp; la suite</h1>
      </div>
      <span class="live"><span class="dot"></span><span id="freshness">connexion…</span></span>
    </header>
    <main id="board">
      <p class="notice">Chargement du sprint en cours…</p>
    </main>

    <script>
      const board = document.getElementById("board");
      const freshness = document.getElementById("freshness");

      document.getElementById("eyebrow").textContent =
        "Dailyapss - Auto · Daily du " +
        new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

      const initials = (name) =>
        name === "Non assigné"
          ? "?"
          : name.split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase();

      const NO_COMPONENT = "Sans composant";

      // Stable unique background color per component name (hash -> hue).
      const componentColor = (name) => {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
        }
        const hue = hash % 360;
        return `hsl(${hue}, 85%, 60%)`;
      };

      // Renders a column's cards grouped under their component(s).
      const columnHtml = (cards, emptyText) => {
        if (!cards.length) return `<p class="empty">${emptyText}</p>`;
        const byComponent = new Map();
        for (const card of cards) {
          const names = card.components.length ? card.components : [NO_COMPONENT];
          for (const name of names) {
            if (!byComponent.has(name)) byComponent.set(name, []);
            byComponent.get(name).push(card);
          }
        }
        const names = [...byComponent.keys()].sort((a, b) => {
          if (a === NO_COMPONENT) return 1;
          if (b === NO_COMPONENT) return -1;
          return a.localeCompare(b);
        });
        return names
          .map(
            (name) => `
              <div class="comp-group">
                <p class="comp-label"><span class="comp-chip" style="background: ${componentColor(name)};">${escapeHtml(name)}</span></p>
                ${byComponent.get(name).map(cardHtml).join("")}
              </div>`
          )
          .join("");
      };

      const cardHtml = (card) => `
        <a class="card" href="${card.url}" target="_blank" rel="noopener">
          <div class="top">
            <span class="key">${card.key}</span>
            <span class="pill">${card.status}</span>
          </div>
          <div class="summary">${escapeHtml(card.summary)}</div>
        </a>`;

      const escapeHtml = (s) =>
        s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      const collapsed = new Set();
      let firstRender = true;

      const laneHtml = (person) => {
        const isCollapsed = collapsed.has(person.name);
        return `
        <section class="lane${isCollapsed ? " collapsed" : ""}" data-person="${escapeHtml(person.name)}">
          <button class="who" type="button" aria-expanded="${!isCollapsed}">
            <div class="avatar">${initials(person.name)}</div>
            <div>
              <div class="name">${escapeHtml(person.name)}</div>
              <div class="count">${person.done.length} terminé(s) · ${person.progress.length} en cours · ${person.todo.length} à faire · ${person.estimate.length} à chiffrer</div>
            </div>
            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="col-done">
            <p class="col-label"><span style="color: green;">Terminé depuis le dernier daily</span></p>
            <div class="stack">
              ${columnHtml(person.done, "Rien de terminé pour l'instant")}
            </div>
          </div>
          <div class="col-progress">
            <p class="col-label"><span style="color: blue;">En cours</span></p>
            <div class="stack">
              ${columnHtml(person.progress, "Rien en cours")}
            </div>
          </div>
          <div class="col-todo">
            <p class="col-label"><span style="color: gold;">À faire</span></p>
            <div class="stack">
              ${columnHtml(person.todo, "Aucun élément planifié")}
            </div>
          </div>
          <div class="col-estimate">
            <p class="col-label"><span style="color: #7c3aed;">À chiffrer</span></p>
            <div class="stack">
              ${columnHtml(person.estimate, "Rien à chiffrer")}
            </div>
          </div>
        </section>`;
      };

      const render = (data) => {
        const people = data.people ?? [];
        if (!people.length) {
          board.innerHTML = '<p class="notice">Aucun ticket dans le sprint ouvert actuel. Vérifiez qu\'un sprint est démarré dans Jira.</p>';
          return;
        }
        if (firstRender) {
          people.forEach((p) => collapsed.add(p.name));
          firstRender = false;
        }
        board.innerHTML = people.map(laneHtml).join("");
      };

      const load = async () => {
        try {
          const res = await fetch("/api/standup");
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          const data = await res.json();
          render(data);
          freshness.textContent = "mis à jour à " + new Date(data.generatedAt).toLocaleTimeString("fr-FR");
        } catch (err) {
          board.innerHTML = `<p class="notice error">Impossible de joindre Jira : ${escapeHtml(String(err.message))}</p>`;
          freshness.textContent = "échec de la mise à jour";
        }
      };

      board.addEventListener("click", (e) => {
        const who = e.target.closest(".who");
        if (!who) return;
        const lane = who.closest(".lane");
        const name = lane.dataset.person;
        if (collapsed.has(name)) collapsed.delete(name);
        else collapsed.add(name);
        lane.classList.toggle("collapsed");
        who.setAttribute("aria-expanded", String(!lane.classList.contains("collapsed")));
      });

      load();
      setInterval(load, 60000);
    </script>
  </body>
</html>
