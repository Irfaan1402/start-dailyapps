services:
  - type: web
    name: standup-board
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Secrets — set these in the Render dashboard, not in this file.
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      # Non-secret config — committed here so Render doesn't prompt for them.
      - key: JIRA_PROJECT_KEY
        value: DAA
      - key: JIRA_ESTIMATE_SPRINT
        value: À chiffrer
      - key: JIRA_COMPONENT_FIELD
        value: customfield_10390
